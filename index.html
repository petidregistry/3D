<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic 3D Nexus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #0aff5d;
            --glass-bg: rgba(10, 10, 20, 0.6);
            --glass-border: rgba(0, 243, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            overflow-x: hidden;
            background-color: #050505;
            color: #fff;
        }

        /* 3D Canvas Background */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* Glassmorphism UI Overlay */
        .ui-layer {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            pointer-events: none;
        }

        .glass-panel {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
            transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            box-shadow: 0 0 60px rgba(188, 19, 254, 0.2);
            border-color: rgba(188, 19, 254, 0.4);
        }

        .glass-panel.fade-out {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            color: #ccc;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: opacity 0.3s ease;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--neon-blue);
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        button {
            padding: 1rem 2rem;
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        #status-message {
            margin-top: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
            height: 20px;
        }

        /* Success State UI */
        #success-interface {
            display: none;
            animation: fadeIn 1s ease forwards;
        }

        #success-interface h2 {
            color: var(--neon-green);
            font-size: 2rem;
            margin-bottom: 1rem;
            letter-spacing: 3px;
        }

        #btn-proceed {
            border-color: var(--neon-green);
            color: var(--neon-green);
            margin-top: 1rem;
        }

        #btn-proceed:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .glass-panel { padding: 2rem; }
        }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <div class="ui-layer">
        <div class="glass-panel" id="main-panel">
            
            <div id="initial-interface">
                <h1>Nexus Hub</h1>
                <p>Interact with the background. Initiate neural link below.</p>
                
                <form id="transmission-form">
                    <input type="email" id="email" placeholder="ENTER COMM-LINK (EMAIL)" required>
                    <button type="submit" id="submit-btn">Initialize Sequence</button>
                    <div id="status-message"></div>
                </form>
            </div>

            <div id="success-interface">
                <h2>ACCESS GRANTED</h2>
                <p>Neural link verified. The gateway is open.</p>
                <button id="btn-proceed">Enter System</button>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        /* =========================================
           1. 3D SCENE SETUP
           ========================================= */
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30; // Default camera distance

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Core Object
        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00f3ff, 
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const torusKnot = new THREE.Mesh(geometry, material);
        scene.add(torusKnot);

        // Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.1,
            color: 0xbc13fe,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // State variables
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;
        let isSystemEntered = false; // Triggered when user clicks "Enter System"

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            if (!isSystemEntered) {
                // Standard idle animation
                torusKnot.rotation.y += 0.005;
                torusKnot.rotation.x += 0.002;
                particlesMesh.rotation.y = -0.05 * elapsedTime;
            } else {
                // "Hyperdrive" animation state after entering system
                torusKnot.rotation.y += 0.03; 
                torusKnot.rotation.x += 0.02;
                particlesMesh.rotation.y -= 0.01;
                
                // Zoom camera in smoothly
                camera.position.z += (5 - camera.position.z) * 0.02;
                // Shift particle color to green
                particlesMaterial.color.lerp(new THREE.Color(0x0aff5d), 0.01);
            }

            // Parallax effect
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
            particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);
            torusKnot.rotation.y += 0.05 * (targetX - torusKnot.rotation.y);
            torusKnot.rotation.x += 0.05 * (targetY - torusKnot.rotation.x);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        /* =========================================
           2. BACKEND INTEGRATION & UI LOGIC
           ========================================= */
        
        // REPLACE THIS with your new Web App URL
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxrUY3rPfIqiY5bWfgMPYPqwmIsLj1vfPUAUF2WdE7NmjdVnBD379Jzxi3hiZ6tqN9d/exec';

        const form = document.getElementById('transmission-form');
        const statusMsg = document.getElementById('status-message');
        const submitBtn = document.getElementById('submit-btn');
        const initialInterface = document.getElementById('initial-interface');
        const successInterface = document.getElementById('success-interface');
        const btnProceed = document.getElementById('btn-proceed');
        const mainPanel = document.getElementById('main-panel');

        // Form Submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            statusMsg.style.color = 'var(--neon-blue)';
            statusMsg.innerText = 'Transmitting data...';
            submitBtn.disabled = true;

            if (APPS_SCRIPT_URL === 'YOUR_WEB_APP_URL_HERE') {
                // Simulation mode if URL not replaced
                setTimeout(() => triggerSuccessState(), 1000);
                return;
            }

            try {
                // Note: Content-Type is 'text/plain' to bypass CORS preflight in browser
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ email: email, timestamp: new Date().toISOString() })
                });

                const result = await response.json();
                
                if(result.status === "success") {
                    triggerSuccessState();
                } else {
                    throw new Error("Server rejected data");
                }
            } catch (error) {
                statusMsg.style.color = 'red';
                statusMsg.innerText = 'Connection lost. Try again.';
                submitBtn.disabled = false;
            }
        });

        // Transition UI to Success State
        function triggerSuccessState() {
            initialInterface.style.display = 'none';
            successInterface.style.display = 'block';
        }

        // Proceed Button Click Logic
        btnProceed.addEventListener('click', () => {
            // Hide the UI panel entirely
            mainPanel.classList.add('fade-out');
            
            // Trigger 3D Hyperdrive state
            isSystemEntered = true;

            // Optional: Redirect the user after the animation plays for 3 seconds
            /*
            setTimeout(() => {
                window.location.href = "https://your-next-page.com";
            }, 3000);
            */
        });
    </script>
</body>
</html>
